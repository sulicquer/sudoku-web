<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极致数独 - 纯粹的逻辑之美</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="glass-container app-wrapper">
        <header>
            <div class="header-top">
                <h1>极致数独</h1>
                <a href="https://github.com/sulicquer/sudoku-web" target="_blank" class="github-link"
                    title="在 GitHub 上查看源码">
                    <svg height="28" viewBox="0 0 16 16" width="28" fill="currentColor">
                        <path
                            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
                        </path>
                    </svg>
                </a>
            </div>
            <div class="status-bar">
                <div class="difficulty-selector">
                    <span class="diff-btn active" data-level="easy">简单</span>
                    <span class="diff-btn" data-level="medium">中等</span>
                    <span class="diff-btn" data-level="hard">困难</span>
                </div>
                <div class="stats">
                    <div class="stat-item" id="timer">00:00</div>
                    <div class="stat-item mistakes">错误: <span id="mistake-count">0</span>/3</div>
                </div>
            </div>
        </header>

        <main>
            <div id="sudoku-board" class="sudoku-board">
                <!-- 81 cells will be generated by JS -->
            </div>
        </main>

        <div class="controls">
            <div class="tools">
                <button class="tool-btn" id="btn-undo" title="撤销">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M3 10h10a5 5 0 0 1 5 5v2a5 5 0 0 1-5 5H3" />
                        <polyline points="7 6 3 10 7 14" />
                    </svg>
                </button>
                <button class="tool-btn" id="btn-erase" title="擦除">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <path
                            d="M20 20H7L3 16C2.5 15.5 2.5 14.5 3 14L13 4C13.5 3.5 14.5 3.5 15 4L20 9C20.5 9.5 20.5 10.5 20 11L11 20H20V20Z" />
                    </svg>
                </button>
                <button class="tool-btn" id="btn-hint" title="提示">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 16v-4" />
                        <path d="M12 8h.01" />
                    </svg>
                </button>
            </div>
            <div class="numpad">
                <!-- numbers 1-9 -->
                <button class="num-btn" data-val="1">1</button>
                <button class="num-btn" data-val="2">2</button>
                <button class="num-btn" data-val="3">3</button>
                <button class="num-btn" data-val="4">4</button>
                <button class="num-btn" data-val="5">5</button>
                <button class="num-btn" data-val="6">6</button>
                <button class="num-btn" data-val="7">7</button>
                <button class="num-btn" data-val="8">8</button>
                <button class="num-btn" data-val="9">9</button>
            </div>
            <button class="primary-btn" id="btn-new-game">新游戏</button>
        </div>
    </div>

    <!-- 游戏结束/胜利弹窗 -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content glass-container">
            <h2 id="modal-title">游戏结束</h2>
            <p id="modal-message">你已经达到最大错误次数限制。</p>
            <button class="primary-btn" id="btn-modal-close">重新开始</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
